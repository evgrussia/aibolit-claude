services:
  backend:
    build:
      context: .
      target: backend
    volumes:
      - aibolit-data:/app/data
    environment:
      - AIBOLIT_SECRET_KEY=${AIBOLIT_SECRET_KEY:-aibolit-secret-key-change-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  aibolit-data:
