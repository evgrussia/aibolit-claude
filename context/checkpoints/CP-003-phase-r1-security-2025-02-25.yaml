    # R1.4: Refresh Tokens
    - path: "web/backend/auth.py"
      status: "updated"
      summary: "create_access_token (15min), create_refresh_token (7d), decode_token"
    - path: "web/frontend/src/api/client.ts"
      status: "rewritten"
