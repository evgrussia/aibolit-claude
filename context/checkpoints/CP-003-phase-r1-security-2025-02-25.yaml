    # R1.5: Informed Consent
    - path: "web/frontend/src/contexts/AuthContext.tsx"
      status: "updated"
      summary: "REFRESH_KEY в localStorage, consent fields в RegisterData"
    - path: "web/frontend/src/pages/LoginPage.tsx"
      status: "updated"
      summary: "4-шаговая регистрация: шаг 4 — два обязательных consent checkbox"
    - path: "web/backend/main.py"
      status: "updated"
      summary: "PostgreSQL init_db() вместо SQLite ensure_schema()"

  decisions:
    - id: "DEC-012"
      decision: "Миграция на PostgreSQL + SQLAlchemy Core (не ORM)"
      rationale: "Production-grade СУБД с ACID, шифрованием, concurrent access. Core вместо ORM для минимального рефакторинга существующего кода"
      stakeholder: "Architect + Coder"
    - id: "DEC-013"
      decision: "Fernet AES-128 с enc: prefix для field-level encryption"
      rationale: "Стандарт cryptography library, backward compat с незашифрованными данными, graceful degradation в dev-режиме"
      stakeholder: "Security + Coder"
    - id: "DEC-014"
      decision: "Шифрование только narrative-полей (notes, complaints, content), не structured (ICD codes, dates, numbers)"
      rationale: "Баланс безопасности и searchability — SQL-запросы по структурированным данным продолжают работать"
      stakeholder: "Security + Data"
    - id: "DEC-015"
      decision: "Access token 15 min + Refresh token 7 дней"
      rationale: "Стандартный паттерн: короткие access для безопасности, длинные refresh для UX. Auto-refresh interceptor прозрачен для пользователя"
      stakeholder: "Security + Coder"
    - id: "DEC-016"
      decision: "4-шаговая регистрация с обязательным informed consent"
      rationale: "Требование 152-ФЗ (ст.9) и rules/05-medical-safety.md. Двойная валидация: frontend + backend"
      stakeholder: "Compliance + Coder"

