      fix: "Removed from auth.py"
    - id: "M3"
      finding: "Diagnosis regex too broad (false positives on hedged forms)"
      fix: "Added negative lookahead for 'может', 'возможно', 'вероятно', 'скорее', 'предположительно'"
    - id: "M5"
      finding: "Rate limited requests not logged"
      fix: "Added logger.warning for 429 responses in middleware"

