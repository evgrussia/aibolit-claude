<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Айболит — Нет подключения</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8fafc;
        color: #334155;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 420px;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: #0ea5e9;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 48px;
        height: 48px;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #0f172a;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 24px;
        color: #64748b;
      }
      .retry-btn {
        display: inline-block;
        padding: 12px 32px;
        background: #0ea5e9;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }
      .retry-btn:hover {
        background: #0284c7;
      }
      .retry-btn:active {
        background: #0369a1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1>Нет подключения к интернету</h1>
      <p>Проверьте соединение и попробуйте снова. Приложение заработает автоматически, когда связь восстановится.</p>
      <button class="retry-btn" onclick="window.location.reload()">Попробовать снова</button>
    </div>
  </body>
</html>
