services:
  backend:
    build:
      context: .
      target: backend
    volumes:
      - aibolit-claude-data:/app/data
    environment:
      - AIBOLIT_SECRET_KEY=${AIBOLIT_SECRET_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - WHO_ICD_CLIENT_ID=${WHO_ICD_CLIENT_ID}
      - WHO_ICD_CLIENT_SECRET=${WHO_ICD_CLIENT_SECRET}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "127.0.0.1:8102:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  aibolit-claude-data:
