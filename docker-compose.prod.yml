services:
  backend:
    build:
      context: .
      target: backend
    volumes:
      - aibolit-claude-data:/app/data
    environment:
      - AIBOLIT_SECRET_KEY=${AIBOLIT_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "127.0.0.1:8102:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      target: mcp
    ports:
      - "127.0.0.1:8103:8103"
    volumes:
      - aibolit-claude-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8103/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  aibolit-claude-data:
